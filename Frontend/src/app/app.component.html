<div class="chat-layout">
  <!-- Header App -->
  <header class="chat-header">
    <div class="logo-area">
      <div class="bot-avatar header-avatar">🤖</div>
      <div class="titles">
        <h1>PolibAI <span class="badge">2.0</span></h1>
        <span class="subtitle">Orientamento Intelligente - Politecnico di Bari</span>
      </div>
    </div>
  </header>

  <!-- Area Centrale -->
  <main class="chat-container">
    <div class="messages-wrapper" #chatScroll>
      <div class="message" *ngFor="let msg of messages" [ngClass]="msg.sender">
        <div class="avatar">
          {{ msg.sender === 'bot' ? '🤖' : '👤' }}
        </div>
        <div class="bubble-container">
          <div class="bubble">
            <!-- Simple markdown-like rendering could go here, for now using pre-wrap text -->
            <pre class="msg-text">{{ msg.text }}</pre>
          </div>
          <span class="timestamp">
            {{ msg.timestamp | date:'HH:mm' }} 
            <span class="debug-route" *ngIf="msg.routing">[Route: {{ msg.routing }}]</span>
          </span>
        </div>
      </div>
      
      <!-- Typing Indicator -->
      <div class="message bot typing-indicator" *ngIf="isTyping">
        <div class="avatar">🤖</div>
        <div class="bubble">
          <div class="dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick Actions Panel -->
    <div class="quick-actions" *ngIf="messages.length < 3">
      <button class="action-btn" *ngFor="let action of quickActions" (click)="sendQuickAction(action.prompt)">
        {{ action.label }}
      </button>
    </div>
  </main>

  <!-- Input Area -->
  <footer class="chat-footer">
    <div class="input-container">
      <textarea 
        [(ngModel)]="userInput" 
        (keyup.enter)="sendMessage()"
        placeholder="Chiedi informazioni su corsi, ISEEE o bandi..."
        rows="1">
      </textarea>
      <button class="send-btn" (click)="sendMessage()" [disabled]="!userInput.trim() || isTyping">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" /></svg>
      </button>
    </div>
  </footer>
</div>
